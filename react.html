*{font-family:'Cairo',sans-serif;box-sizing:border-box}
:root{
  --bg:#0b1612;--surface:#111f14;--s2:#162b1a;--s3:#1c3422;
  --bdr:rgba(255,255,255,.07);--bdr2:rgba(255,255,255,.12);
  --tx:#e2e8f0;--mu:#64748b;--mu2:#94a3b8;
  --g:#22c55e;--g2:#16a34a;--g3:#4ade80;
  --gold:#f59e0b;--gold2:#fbbf24;
  --card:rgba(255,255,255,.03);
  --nav-bg:rgba(11,22,18,.93);
  --foot-bg:#080f0b;
}
body{background:var(--bg);color:var(--tx);margin:0}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--g2);border-radius:10px}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes growUp{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 10px rgba(34,197,94,0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
@keyframes pageIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.au{animation:fadeUp .5s ease both}
.au1{animation:fadeUp .5s .08s ease both;opacity:0}
.au2{animation:fadeUp .5s .16s ease both;opacity:0}
.au3{animation:fadeUp .5s .24s ease both;opacity:0}
.au4{animation:fadeUp .5s .32s ease both;opacity:0}
.asc{animation:scaleIn .35s ease both}
.afi{animation:fadeIn .35s ease both}
.afloat{animation:float 3.5s ease-in-out infinite}
.pg{animation:pageIn .45s ease both}
.shake{animation:shake .35s ease}

/* ── Glass ── */
.glass{background:var(--card);border:1px solid var(--bdr);backdrop-filter:blur(12px);border-radius:18px}
.glass2{background:rgba(255,255,255,.05);border:1px solid var(--bdr2);border-radius:14px}
.ghov{transition:all .25s}
.ghov:hover{background:rgba(255,255,255,.055);border-color:rgba(34,197,94,.25);transform:translateY(-3px);box-shadow:0 12px 36px rgba(34,197,94,.1)}

/* ── Shimmer ── */
.shimmer{background:linear-gradient(90deg,#22c55e,#86efac,#fbbf24,#22c55e);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 4s linear infinite}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;font-weight:700;border-radius:11px;transition:all .2s;cursor:pointer;border:none;font-family:'Cairo',sans-serif;font-size:14px}
.bg-btn{background:linear-gradient(135deg,var(--g2),var(--g));color:#fff;padding:10px 20px;box-shadow:0 4px 14px rgba(34,197,94,.2)}
.bg-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(34,197,94,.35)}
.out-btn{border:1.5px solid rgba(34,197,94,.4);color:var(--g3);background:transparent;padding:9px 18px}
.out-btn:hover{background:rgba(34,197,94,.08);border-color:var(--g)}
.gh-btn{background:rgba(255,255,255,.05);color:var(--mu2);padding:9px 16px}
.gh-btn:hover{background:rgba(255,255,255,.1);color:var(--tx)}
.sm-btn{padding:7px 14px;font-size:12px;border-radius:9px}
.red-btn{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25);padding:8px 14px}
.red-btn:hover{background:rgba(239,68,68,.22)}
.gold-btn{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25);padding:8px 14px}
.gold-btn:hover{background:rgba(245,158,11,.2)}
.blue-btn{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25);padding:8px 14px}

/* ── Input ── */
.inp{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1.5px solid var(--bdr2);border-radius:10px;font-size:14px;color:var(--tx);transition:border-color .2s,box-shadow .2s;font-family:'Cairo',sans-serif}
.inp:focus{outline:none;border-color:rgba(34,197,94,.5);box-shadow:0 0 0 3px rgba(34,197,94,.08)}
.inp::placeholder{color:var(--mu)}
.inp option{background:#1a2e1f;color:var(--tx)}
.inp-err{border-color:rgba(239,68,68,.5)!important}
.inp-err:focus{box-shadow:0 0 0 3px rgba(239,68,68,.08)!important}

/* ── Badge ── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700}
.bg{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.25)}
.bb{background:rgba(59,130,246,.12);color:#60a5fa;border:1px solid rgba(59,130,246,.25)}
.ba{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.25)}
.br{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.25)}
.bpu{background:rgba(168,85,247,.12);color:#c084fc;border:1px solid rgba(168,85,247,.25)}
.bgr{background:rgba(255,255,255,.06);color:var(--mu2);border:1px solid var(--bdr)}

/* ── Nav ── */
.nl{color:var(--mu2);font-weight:600;font-size:13px;padding:7px 12px;border-radius:9px;transition:all .2s;cursor:pointer;border:none;background:none;font-family:'Cairo',sans-serif}
.nl:hover{color:var(--g3);background:rgba(34,197,94,.07)}
.na{color:var(--g3);background:rgba(34,197,94,.1)}

/* ── Sidebar ── */
.sbi{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;font-size:13px;font-weight:600;color:var(--mu2);cursor:pointer;transition:all .2s;border:none;background:none;width:100%;font-family:'Cairo',sans-serif;text-align:right}
.sbi:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.sba{background:rgba(34,197,94,.12);color:var(--g3);border-right:3px solid var(--g)}

/* ── Tab ── */
.tab{padding:8px 16px;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;border:none;background:transparent;font-family:'Cairo',sans-serif;color:var(--mu)}
.tab:hover{color:var(--tx);background:rgba(255,255,255,.04)}
.tba{background:var(--g2);color:#fff}

/* ── Table ── */
.tbl th{padding:11px 16px;text-align:right;font-size:11px;font-weight:700;color:var(--mu);background:rgba(255,255,255,.02);border-bottom:1px solid var(--bdr);white-space:nowrap;letter-spacing:.04em}
.tbl td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:hover td{background:rgba(34,197,94,.03)}

/* ── Misc ── */
.prog{height:5px;border-radius:50px;background:rgba(255,255,255,.07);overflow:hidden}
.prog-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--g2),var(--g3));transition:width .9s ease}
.upload-zone{border:2px dashed rgba(255,255,255,.12);border-radius:12px;padding:24px;text-align:center;transition:all .2s;cursor:pointer}
.upload-zone:hover{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.04)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;animation:fadeIn .2s ease}
.modal-box{background:#131f16;border:1px solid var(--bdr2);border-radius:20px;width:100%;max-width:640px;max-height:92vh;overflow-y:auto;animation:scaleIn .3s ease;box-shadow:0 30px 80px rgba(0,0,0,.5)}
.sec-title{font-size:30px;font-weight:900;color:var(--g3)}
.sec-sub{font-size:13px;color:var(--mu)}
.divider{height:1px;background:var(--bdr);margin:16px 0}
.chip{display:inline-flex;align-items:center;gap:6px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:var(--g3);padding:5px 14px;border-radius:50px;font-size:12px;font-weight:700}
.counter-ring{width:52px;height:52px;border-radius:50%;background:rgba(34,197,94,.1);border:2px solid var(--g2);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:var(--g3);flex-shrink:0}
.stat-card{background:linear-gradient(135deg,rgba(34,197,94,.08),rgba(34,197,94,.03));border:1px solid rgba(34,197,94,.15);border-radius:16px;padding:20px}
.hero-bg{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(34,197,94,.15) 0%,transparent 65%),radial-gradient(ellipse 40% 40% at 80% 60%,rgba(245,158,11,.06) 0%,transparent 60%),var(--bg)}
.clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-card-wrap:hover .news-img{transform:scale(1.04)}
.news-img{width:100%;height:155px;display:flex;align-items:center;justify-content:center;font-size:56px;transition:transform .3s}

/* ── Auth ── */
.auth-card{background:rgba(255,255,255,.04);border:1px solid var(--bdr2);border-radius:20px;padding:36px 32px;width:100%;max-width:420px}
.auth-shield{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(22,163,74,.08));border:1px solid rgba(34,197,94,.3);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;animation:glow 3s infinite}

/* ── Theme preview ── */
.theme-swatch{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;transition:all .2s}
.theme-swatch.active{border-color:var(--g3);transform:scale(1.2)}

/* ── Toast ── */
.toast{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:600;padding:13px 24px;border-radius:14px;font-weight:700;font-size:14px;display:flex;gap:10px;align-items:center;animation:scaleIn .3s ease;white-space:nowrap}
.toast-success{background:linear-gradient(135deg,#16a34a,#22c55e);color:#fff;box-shadow:0 8px 28px rgba(34,197,94,.4)}
.toast-error{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff;box-shadow:0 8px 28px rgba(239,68,68,.4)}

/* ── Download btn ── */
.dl-btn{display:inline-flex;align-items:center;gap:6px;background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.25);padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Cairo',sans-serif}
.dl-btn:hover{background:rgba(59,130,246,.2)}

/* ── Grain overlay ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.35}

/* ── Access Denied ── */
.lock-anim{animation:bounce 2s ease-in-out infinite}

/* ── Theme switching transitions ── */
body,body *{transition:background-color .3s ease,color .3s ease,border-color .3s ease}
body::before,svg,img,.btn,.tab,.badge,.sbi,.nl,.prog-fill,.shimmer{transition:none!important}
</style>

const AuthContext=createContext();
const ThemeContext=createContext();
const DataContext=createContext();
const ToastContext=createContext();

/* AUTH PROVIDER */
const AuthProvider=({children})=>{
  const [authUser,setAuthUser]=useState(()=>{
    try{const s=sessionStorage.getItem('gvs_auth');return s?JSON.parse(s):null}catch{return null}
  });
  const login=(email,pw)=>{
    const found=ADMIN_DB.find(a=>a.email.toLowerCase()===email.toLowerCase()&&a.password===pw);
    if(found){const{password:_,...safe}=found;sessionStorage.setItem('gvs_auth',JSON.stringify(safe));setAuthUser(safe);return{success:true}}
    return{success:false,error:'البريد الإلكتروني أو كلمة المرور غير صحيحة'}
  };
  const logout=()=>{sessionStorage.removeItem('gvs_auth');setAuthUser(null)};
  return(
    <AuthContext.Provider value={{authUser,login,logout,isAdmin:authUser?.role==='admin',isLoggedIn:!!authUser}}>
      {children}
    </AuthContext.Provider>
  );
};

/* THEME PROVIDER */
const ThemeProvider=({children})=>{
  const [theme,setThemeState]=useState(()=>localStorage.getItem('gvs_theme')||'dark');
  const setTheme=t=>{setThemeState(t);localStorage.setItem('gvs_theme',t)};
  useEffect(()=>{
    let el=document.getElementById('gvs-theme-css');
    if(!el){el=document.createElement('style');el.id='gvs-theme-css';document.head.appendChild(el)}
    el.textContent=THEMES[theme]?.css||'';
    document.body.setAttribute('data-theme',theme);
  },[theme]);
  return <ThemeContext.Provider value={{theme,setTheme}}>{children}</ThemeContext.Provider>;
};

/* DATA PROVIDER */
const DataProvider=({children})=>{
  const [news,setNews]=useState(INIT_NEWS);
  const [research,setResearch]=useState(INIT_RESEARCH);
  const addNews=item=>setNews(p=>[{...item,id:Date.now()},...p]);
  const updateNews=(id,item)=>setNews(p=>p.map(n=>n.id===id?{...item,id}:n));
  const deleteNews=id=>setNews(p=>p.filter(n=>n.id!==id));
  const addResearch=item=>setResearch(p=>[{...item,id:Date.now()},...p]);
  const updateResearch=(id,item)=>setResearch(p=>p.map(r=>r.id===id?{...item,id}:r));
  const deleteResearch=id=>setResearch(p=>p.filter(r=>r.id!==id));
  return(
    <DataContext.Provider value={{news,addNews,updateNews,deleteNews,research,addResearch,updateResearch,deleteResearch}}>
      {children}
    </DataContext.Provider>
  );
};

/* TOAST PROVIDER */
const ToastProvider=({children})=>{
  const [toast,setToast]=useState(null);
  const showToast=(msg,type='success')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };
  return(
    <ToastContext.Provider value={showToast}>
      {children}
      {toast&&(
        <div className={`toast toast-${toast.type} au`}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d={toast.type==='success'?"M20 6L9 17l-5-5":"M18 6L6 18M6 6l12 12"}/></svg>
          {toast.msg}
        </div>
      )}
    </ToastContext.Provider>
  );
};

  const [shakeKey,setShakeKey]=useState(0);

  useEffect(()=>{if(isLoggedIn&&isAdmin)setPage('admin')},[isLoggedIn]);

  const handleLogin=async()=>{
    if(!email||!pw){setErr('يرجى إدخال البريد الإلكتروني وكلمة المرور');return}
    if(attempts>=5){setErr('تم تجاوز الحد الأقصى للمحاولات. يرجى المحاولة لاحقاً.');return}
    setLoading(true);setErr('');
    await new Promise(r=>setTimeout(r,900));
    const res=login(email,pw);
    setLoading(false);
    if(res.success){showToast('تم تسجيل الدخول بنجاح! 🎉');setTimeout(()=>setPage('admin'),400)}
    else{setErr(res.error);setAttempts(a=>a+1);setShakeKey(k=>k+1)}
  };

  const handleKey=e=>{if(e.key==='Enter')handleLogin()};

  return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'radial-gradient(ellipse at 50% -10%,rgba(34,197,94,.12) 0%,transparent 60%),var(--bg)'}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:28}}>
          <div className="auth-shield">
            <Ico d={I.lock} s={28} c="text-green-400"/>
          </div>
          <h1 style={{fontSize:24,fontWeight:900,color:'#f1f5f9',marginBottom:6}}>تسجيل دخول الإدارة</h1>
          <p style={{fontSize:13,color:'#64748b'}}>منطقة محمية — المسؤولون المعتمدون فقط</p>
        </div>

        {/* Form */}
        <div key={shakeKey} className={err?'shake':''} style={{display:'flex',flexDirection:'column',gap:14}}>
          <div>
            <Label s="البريد الإلكتروني"/>
            <div style={{position:'relative'}}>
              <Ico d={I.mail} s={15} c="" style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#64748b',pointerEvents:'none'}}/>
              <input value={email} onChange={e=>{setEmail(e.target.value);setErr('')}} onKeyDown={handleKey}
                className={`inp ${err?'inp-err':''}`} placeholder="admin@gvs-egypt.gov.eg" dir="ltr"
                style={{paddingRight:38,paddingLeft:14}}/>
            </div>
          </div>
          <div>
            <Label s="كلمة المرور"/>
            <div style={{position:'relative'}}>
              <Ico d={I.lock} s={15} c="" style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',color:'#64748b',pointerEvents:'none'}}/>
              <input type={showPw?'text':'password'} value={pw} onChange={e=>{setPw(e.target.value);setErr('')}} onKeyDown={handleKey}
                className={`inp ${err?'inp-err':''}`} placeholder="كلمة المرور" dir="ltr"
                style={{paddingRight:38,paddingLeft:40}}/>
              <button onClick={()=>setShowPw(v=>!v)} style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',border:'none',background:'none',cursor:'pointer',padding:2}}>
                <Ico d={showPw?I.eyeoff:I.eye} s={15} c="text-gray-500"/>
              </button>
            </div>
          </div>

          {err&&(
            <div style={{background:'rgba(239,68,68,.1)',border:'1px solid rgba(239,68,68,.25)',borderRadius:10,padding:'10px 14px',display:'flex',gap:8,alignItems:'center'}}>
              <Ico d={I.info} s={15} c="text-red-400" style={{flexShrink:0}}/>
              <span style={{fontSize:13,color:'#f87171'}}>{err}</span>
            </div>
          )}

          {attempts>2&&attempts<5&&(
            <div style={{background:'rgba(245,158,11,.08)',border:'1px solid rgba(245,158,11,.2)',borderRadius:10,padding:'9px 14px',fontSize:12,color:'#fbbf24'}}>
              ⚠️ تبقى {5-attempts} محاولات قبل قفل الوصول المؤقت
            </div>
          )}

          <button className="btn bg-btn" style={{width:'100%',justifyContent:'center',fontSize:15,padding:'13px 0',marginTop:6}} onClick={handleLogin} disabled={loading}>
            {loading?(
              <><svg style={{animation:'spin 1s linear infinite'}} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z" opacity=".3"/><path d="M12 3a9 9 0 019 9"/></svg>جارٍ التحقق...</>
            ):<><Ico d={I.key} s={16}/>دخول لوحة التحكم</>}
          </button>
        </div>

        <Divider/>
        <div style={{display:'flex',gap:8,alignItems:'center',justifyContent:'center'}}>
          <button className="btn gh-btn btn-sm" onClick={()=>setPage('home')} style={{justifyContent:'center'}}><Ico d={I.arrL} s={13}/>العودة للموقع</button>
        </div>

        {/* Security note */}
        <div style={{marginTop:20,padding:'12px 14px',background:'rgba(34,197,94,.05)',border:'1px solid rgba(34,197,94,.12)',borderRadius:10,display:'flex',gap:8,alignItems:'flex-start'}}>

      </div>
    </div>
  );
};

/* Protected Route wrapper */
const ProtectedRoute=({children,requireAdmin=false,setPage})=>{
  const {isLoggedIn,isAdmin}=useContext(AuthContext);
  if(!isLoggedIn)return <LoginPage setPage={setPage}/>;
  if(requireAdmin&&!isAdmin)return <AccessDeniedPage setPage={setPage}/>;
  return children;
};

            <div><Label s="عدد الصفحات"/><input type="number" value={form.pages} onChange={e=>setForm(f=>({...f,pages:e.target.value}))} className="inp" placeholder="42"/></div>
          </FieldRow>
          <div><Label s="ملخص البحث"/><textarea value={form.abstract} onChange={e=>setForm(f=>({...f,abstract:e.target.value}))} className="inp" rows={3} placeholder="ملخص تنفيذي للبحث..." style={{resize:'vertical'}}/></div>

            <input type="checkbox" checked={form.downloadable} onChange={e=>setForm(f=>({...f,downloadable:e.target.checked}))} style={{width:15,height:15,accentColor:'#16a34a'}}/>

          </div>
        </Modal>
      )}
      {delId&&<DeleteConfirm onClose={()=>setDelId(null)} onConfirm={confirmDel} label="هذا البحث"/>}
    </div>
  );
};

        <div style={{fontSize:56,marginBottom:14}}>🎉</div>
        <h2 style={{fontSize:26,fontWeight:900,color:'#f1f5f9',marginBottom:7}}>تم التسجيل!</h2>
        <p style={{color:'#94a3b8',marginBottom:18,lineHeight:1.8,fontSize:13}}>سيتم مراجعة طلبك خلال 2-3 أيام عمل</p>
        <div className="badge bg" style={{justifyContent:'center',marginBottom:22,padding:'7px 18px',fontSize:13}}>رقم طلبك: SUP-2026-{Math.floor(Math.random()*9000+1000)}</div>
        <button className="btn bg-btn" style={{width:'100%',justifyContent:'center'}} onClick={()=>setPage('home')}>العودة للرئيسية</button>
      </div>
    </div>
  );
  return(
    <div style={{maxWidth:600,margin:'0 auto',padding:'44px 20px'}} className="pg">
      <div style={{textAlign:'center',marginBottom:28}} className="au">
        <h1 style={{fontSize:30,fontWeight:900,color:'#fff',marginBottom:5}}>تسجيل مورد جديد</h1>
        <p style={{color:'#94a3b8',fontSize:13}}>انضم إلى شبكة الموردين المعتمدين</p>
      </div>
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:26}} className="au1">
        {['البيانات الشخصية','بيانات المزرعة','كلمة المرور'].map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
              <div style={{width:30,height:30,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,background:step>i+1?'#16a34a':step===i+1?'rgba(34,197,94,.15)':'rgba(255,255,255,.05)',color:step>i+1?'#fff':step===i+1?'#4ade80':'#64748b',border:step===i+1?'2px solid #22c55e':'2px solid transparent'}}>
                {step>i+1?<Ico d={I.check} s={12}/>:i+1}
              </div>
              <span style={{fontSize:9,color:step===i+1?'#4ade80':'#64748b',fontWeight:600,textAlign:'center'}}>{s}</span>
            </div>
            {i<2&&<div style={{flex:1,height:2,background:step>i+1?'#16a34a':'rgba(255,255,255,.06)',borderRadius:50,marginBottom:16}}/>}
          </React.Fragment>
        ))}
      </div>
      <div className="glass au2" style={{padding:'24px 26px'}}>
        {step===1&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            {[{l:'الاسم الكامل *',k:'name',ph:'اسم كامل'},{l:'رقم الهوية *',k:'national_id',ph:'14 رقم'},{l:'البريد الإلكتروني *',k:'email',ph:'email@example.com'},{l:'رقم الهاتف *',k:'phone',ph:'01X XXXX XXXX'}].map(({l,k,ph})=>(
              <div key={k}><Label s={l}/><input value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} className="inp" placeholder={ph} dir={k==='email'?'ltr':'rtl'}/></div>
            ))}
            <div style={{gridColumn:'1/-1'}}><Label s="العنوان التفصيلي *"/><input value={form.address} onChange={e=>setForm(f=>({...f,address:e.target.value}))} className="inp" placeholder="الشارع، المدينة"/></div>
            <div><Label s="المحافظة"/><select value={form.gov} onChange={e=>setForm(f=>({...f,gov:e.target.value}))} className="inp" style={{cursor:'pointer'}}>{govs.map(g=><option key={g}>{g}</option>)}</select></div>
          </div>
        )}
        {step===2&&(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:13}}>
            <div style={{gridColumn:'1/-1'}}><Label s="اسم المزرعة *"/><input value={form.farm_name} onChange={e=>setForm(f=>({...f,farm_name:e.target.value}))} className="inp" placeholder="اسم المزرعة"/></div>
            <div><Label s="سنوات الخبرة"/><input value={form.exp} onChange={e=>setForm(f=>({...f,exp:e.target.value}))} className="inp" placeholder="مثال: 10 سنوات"/></div>
            <div style={{gridColumn:'1/-1'}}>
              <Label s="أنواع الحيوانات *"/>
              <div style={{display:'flex',gap:7,flexWrap:'wrap',marginTop:4}}>
                {['أبقار','جاموس','عجول','أغنام'].map(t=>(
                  <button key={t} onClick={()=>setForm(f=>({...f,animal_types:f.animal_types.includes(t)?f.animal_types.filter(x=>x!==t):[...f.animal_types,t]}))}
                    className="btn sm-btn" style={{background:form.animal_types.includes(t)?'rgba(34,197,94,.15)':'rgba(255,255,255,.04)',color:form.animal_types.includes(t)?'#4ade80':'#64748b',border:`1px solid ${form.animal_types.includes(t)?'rgba(34,197,94,.4)':'rgba(255,255,255,.1)'}`}}>
                    {t}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}
        {step===3&&(
          <div style={{display:'flex',flexDirection:'column',gap:13}}>
            <div><Label s="كلمة المرور *"/><input type="password" value={form.pw} onChange={e=>setForm(f=>({...f,pw:e.target.value}))} className="inp" placeholder="8 أحرف على الأقل" dir="ltr"/></div>
            <div><Label s="تأكيد كلمة المرور *"/><input type="password" value={form.cpw} onChange={e=>setForm(f=>({...f,cpw:e.target.value}))} className="inp" placeholder="أعد الكتابة" dir="ltr"/></div>
            <label style={{display:'flex',alignItems:'flex-start',gap:8,cursor:'pointer'}}>
              <input type="checkbox" style={{width:14,height:14,marginTop:2,accentColor:'#16a34a'}}/>
              <span style={{fontSize:12,color:'#94a3b8',lineHeight:1.7}}>أوافق على <span style={{color:'#4ade80'}}>شروط الاستخدام</span> وسياسة الخصوصية</span>
            </label>
          </div>
        )}
        <div style={{display:'flex',gap:9,marginTop:20}}>
          {step>1&&<button className="btn gh-btn" onClick={()=>setStep(s=>s-1)}><Ico d={I.arrL} s={13}/>السابق</button>}
          <button className="btn bg-btn" style={{flex:1,justifyContent:'center'}} onClick={()=>step<3?setStep(s=>s+1):(()=>{setDone(true);showToast('تم التسجيل بنجاح! ✅')})()}>
            {step<3?<><span>التالي</span><Ico d={I.arr} s={13}/></>:<><Ico d={I.check} s={14}/>إرسال الطلب</>}
          </button>
        </div>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════
   FOOTER
══════════════════════════════════════════════ */
const Footer=({setPage})=>(
  <footer style={{borderTop:'1px solid rgba(255,255,255,.06)',padding:'40px 20px 22px',background:'#080f0b',marginTop:60}}>
    <div style={{maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:26,marginBottom:28}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12}}>
            <div style={{width:32,height:32,borderRadius:9,background:'linear-gradient(135deg,#16a34a,#22c55e)',display:'flex',alignItems:'center',justifyContent:'center'}}><Ico d={I.cow} s={15} c="text-white"/></div>
            <div style={{fontWeight:900,fontSize:11,color:'#4ade80'}}>الجهة العامة للخدمات البيطرية</div>
          </div>
          <p style={{fontSize:11,color:'#64748b',lineHeight:1.9}}>منصة رقمية رسمية لتداول الثروة الحيوانية تحت إشراف وزارة الزراعة المصرية</p>
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:11,color:'#94a3b8',marginBottom:10,textTransform:'uppercase',letterSpacing:'.05em'}}>روابط سريعة</div>
          {[['home','الرئيسية'],['news','الأخبار'],['animals','الحيوانات'],['about','من نحن'],['research','البحوث']].map(([id,l])=>(
            <button key={id} onClick={()=>setPage(id)} style={{display:'block',fontSize:12,color:'#64748b',marginBottom:6,border:'none',background:'none',cursor:'pointer',fontFamily:'Cairo',padding:0,textAlign:'right',transition:'color .2s'}} onMouseEnter={e=>e.target.style.color='#4ade80'} onMouseLeave={e=>e.target.style.color='#64748b'}>{l}</button>
          ))}
        </div>
        <div>
          <div style={{fontWeight:800,fontSize:11,color:'#94a3b8',marginBottom:10,textTransform:'uppercase',letterSpacing:'.05em'}}>تواصل</div>
          <div style={{fontSize:11,color:'#64748b',lineHeight:2.2}}>
            <div>📍 4 شارع نادي الصيد، الدقي، الجيزة</div>
            <div>📞 +20-2-3761-XXXX</div>
            <div>✉️ info@gvs-egypt.gov.eg</div>
          </div>
        </div>
      </div>
      <div style={{height:'1px',background:'rgba(255,255,255,.05)',marginBottom:16}}/>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:8}}>
        <span style={{fontSize:10,color:'#334155'}}>© 2026 الجهة العامة للخدمات البيطرية — جمهورية مصر العربية</span>
        <span style={{fontSize:10,color:'#334155',fontFamily:'IBM Plex Mono'}}>gvs-egypt.gov.eg</span>
      </div>
    </div>
  </footer>
);

/* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
const App=()=>{
  const [page,setPage]=useState('home');
  const [user,setUser]=useState({...USER_DATA});
  useEffect(()=>{window.scrollTo({top:0,behavior:'smooth'})},[page]);

  const isAdmin=page==='admin';

  let content=null;
  if(page==='home')         content=<HomePage setPage={setPage}/>;
  else if(page==='news')    content=<NewsPage setPage={setPage}/>;
  else if(page==='animals') content=<CatsPage setPage={setPage}/>;
  else if(page==='products') content=<ProductsPage/>;
  else if(page==='about')   content=<AboutPage/>;
  else if(page==='minister') content=<MinisterPage/>;
  else if(page==='research') content=<ResearchPage/>;
  else if(page==='contact') content=<ContactPage/>;
  else if(page==='login')   content=<LoginPage setPage={setPage}/>;
  else if(page==='access-denied') content=<AccessDeniedPage setPage={setPage}/>;
  else if(page==='profile') content=<ProfilePage user={user} setUser={setUser}/>;
  else if(page==='admin')   content=<ProtectedRoute requireAdmin={true} setPage={setPage}><AdminDashboard setPage={setPage}/></ProtectedRoute>;
  else if(page==='supplier-register') content=<SupRegPage setPage={setPage}/>;
  else if(page.startsWith('news-'))   content=<NewsDetail id={page.replace('news-','')} setPage={setPage}/>;
  else if(page.startsWith('cat-'))    content=<div style={{maxWidth:1100,margin:'0 auto',padding:'44px 20px'}} className="pg"><div style={{display:'flex',gap:10,marginBottom:20,fontSize:12,color:'#64748b',alignItems:'center'}}><button onClick={()=>setPage('animals')} style={{border:'none',background:'none',color:'#4ade80',fontWeight:700,cursor:'pointer',fontFamily:'Cairo',fontSize:12}}>فئات الحيوانات</button><span>/</span><span style={{color:'#f1f5f9',fontWeight:700}}>{CATS.find(c=>c.id===page.replace('cat-',''))?.name}</span></div><p style={{color:'#94a3b8',textAlign:'center',marginTop:40}}>نظام إدارة هذه الفئة — انظر نسخة gvs-final.html للإدارة الكاملة</p></div>;
  else content=<HomePage setPage={setPage}/>;

  return(
    <AuthProvider>
      <ThemeProvider>
        <DataProvider>
          <ToastProvider>
            <div style={{minHeight:'100vh',display:'flex',flexDirection:'column'}}>
              <Navbar page={page} setPage={setPage} user={user}/>
              <div style={{flex:1}}>{content}</div>
              {!isAdmin&&page!=='login'&&<Footer setPage={setPage}/>}
            </div>
          </ToastProvider>
        </DataProvider>
      </ThemeProvider>
    </AuthProvider>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
